      runtimeEnv:
        publicEnabledModules: "store,studio"  # 允许值：store,studio（多个用英文逗号分隔）
  auth-service:
    chart: auth-service
    version: 0.4.0-main.20260430.2
  basic-search:
    chart: basic-search
    version: 0.4.0-main.20260331.1
  configuration-center:
    chart: configuration-center
    version: 0.4.0-main.20260417.2
  data-application-gateway:
