name: auth-service-build

on:
  push:
    paths:
      - "dsg/services/apps/auth-service/**"
      - ".github/workflows/auth-service-build.yml"
      - ".github/workflows/reusable-build-service.yml"
      - "VERSION"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Whether to also publish the latest tag"
        required: false
        default: "false"

jobs:
  build:
    uses: ./.github/workflows/reusable-build-service.yml
    with:
      service_name: auth-service
      image_name: af/auth-service
      chart_dir: dsg/services/apps/auth-service/helm/auth-service
      dockerfile: dsg/services/apps/auth-service/docker/Dockerfile
      build_context: dsg
      push_latest: ${{ inputs.push_latest || 'false' }}
    secrets: inherit