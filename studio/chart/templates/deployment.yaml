apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- toYaml .Values.labels.deployment | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- toYaml .Values.labels.pod | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- toYaml .Values.labels.pod | nindent 8 }}
    spec:
      volumes:
        - name: openclaw-host-path
          hostPath:
            path: {{ .Values.studio.OpenClawHostPath }}
            type: DirectoryOrCreate
        - name: env-file-host-path
          hostPath:
            path: {{ .Values.studio.envFileHostPath }}
            type: FileOrCreate
      initContainers:
        - name: openclaw-init
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/scripts/openclaw-init.sh"]
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
          resources:
            {{- toYaml .Values.resources.init | nindent 12 }}
          volumeMounts:
            - name: openclaw-host-path
              mountPath: /root/.openclaw
            - name: env-file-host-path
              mountPath: /app/.env
      containers:
        - name: dip-studio
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: studio-http
              protocol: TCP
            - containerPort: {{ .Values.service.mcpTargetPort }}
              name: studio-mcp
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: NODE_ENV
            - name: KWEAVER_HYDRA_ADMIN_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: KWEAVER_HYDRA_ADMIN_URL
            - name: USE_EXTERNAL_OPENCLAW
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: USE_EXTERNAL_OPENCLAW
            - name: OPENCLAW_HOST_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: OPENCLAW_HOST_PATH
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Chart.Name }}-config
                  key: DB_NAME
          resources:
            {{- toYaml .Values.resources.studio | nindent 12 }}
          volumeMounts:
            - name: openclaw-host-path
              mountPath: /root/.openclaw
            - name: env-file-host-path
              mountPath: /app/.env
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
