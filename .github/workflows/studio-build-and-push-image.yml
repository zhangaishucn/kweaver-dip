name: Build And Push Studio Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - "studio/**"
      - "deploy/openclaw-extensions/**"
      - ".github/workflows/studio-build-and-push-image.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "studio/**"
      - "deploy/openclaw-extensions/**"
      - ".github/workflows/studio-build-and-push-image.yml"
  workflow_dispatch:
    inputs:
      image_repository:
        description: "Override image repository path, for example dip/dip-studio"
        required: false
        default: "dip/dip-studio"
      push_latest:
        description: "Whether to also publish the latest tag"
        required: false
        default: "false"

env:
  REGISTRY: swr.cn-east-3.myhuaweicloud.com
  IMAGE_NAMESPACE: kweaver-ai

jobs:
  release-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_tag_no_sha: ${{ steps.version.outputs.release_tag_no_sha }}
      push_latest: ${{ steps.version.outputs.push_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        env:
          WORKFLOW_PUSH_LATEST: ${{ inputs.push_latest || 'false' }}
        run: |
          set -euo pipefail
          ROOT="$(git rev-parse --show-toplevel)"
          cd "${ROOT}"

          SHORT_SHA="$(git rev-parse --short HEAD)"
          SHOULD_PUSH_LATEST="false"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            if [ -z "${RELEASE_VERSION}" ]; then
              echo "ERROR: could not derive version from tag \"${GITHUB_REF_NAME}\"" >&2
              exit 1
            fi
            RELEASE_TAG="${RELEASE_VERSION}-${SHORT_SHA}"
            RELEASE_TAG_NO_SHA="${RELEASE_VERSION}"
          else
            STUDIO_VERSION="$(
              grep -m 1 -v '^[[:space:]]*$' studio/VERSION |
                tr -d '\r' |
                sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
            )"
            if [ -z "${STUDIO_VERSION}" ]; then
              echo "ERROR: could not read a non-empty version from studio/VERSION" >&2
              exit 1
            fi
            BRANCH_OR_REF="${GITHUB_REF_NAME//\//-}"
            RELEASE_TAG="${STUDIO_VERSION}-${BRANCH_OR_REF}.${SHORT_SHA}"
            RELEASE_TAG_NO_SHA="${STUDIO_VERSION}-${BRANCH_OR_REF}"
          fi

          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ] || [ "${WORKFLOW_PUSH_LATEST:-false}" = "true" ]; then
            SHOULD_PUSH_LATEST="true"
          fi

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "release_tag_no_sha=${RELEASE_TAG_NO_SHA}"
            echo "push_latest=${SHOULD_PUSH_LATEST}"
          } >> "${GITHUB_OUTPUT}"

  helm-chart:
    if: github.event_name != 'pull_request'
    needs:
      - release-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Align chart version and image tag with this build
        env:
          RELEASE_TAG: ${{ needs.release-version.outputs.release_tag }}
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          if not tag:
              raise SystemExit("RELEASE_TAG is empty")

          chart = Path("studio/chart/Chart.yaml")
          text = chart.read_text(encoding="utf-8")
          text = re.sub(r"(?m)^version:.*$", f'version: "{tag}"', text)
          text = re.sub(r"(?m)^appVersion:.*$", f'appVersion: "{tag}"', text)
          chart.write_text(text, encoding="utf-8")

          values = Path("studio/chart/values.yaml")
          vt = values.read_text(encoding="utf-8")
          vt_new = re.sub(r"(?m)^(\s*tag:\s*).*$", rf'\1"{tag}"', vt, count=1)
          if vt_new == vt:
              raise SystemExit("failed to update image.tag in studio/chart/values.yaml")
          values.write_text(vt_new, encoding="utf-8")
          PY

      - name: Lint Helm Chart
        run: helm lint studio/chart

      - name: Render Helm Chart (default values)
        run: helm template dip-studio studio/chart -f studio/chart/values.yaml > /dev/null

      - name: Package Helm Chart
        run: |
          mkdir -p dist-chart
          helm package studio/chart --destination dist-chart

      - name: Upload Chart Package (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dip-studio-chart
          path: dist-chart/*.tgz
          if-no-files-found: error

  docker:
    needs:
      - release-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: ${{ inputs.image_repository || 'dip/dip-studio' }}
    defaults:
      run:
        working-directory: studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npx vitest run

      - name: Build Application
        run: npm run build

      - name: Set Up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Sync OpenClaw dip extension into Docker build context
        if: github.event_name != 'pull_request'
        run: |
          rm -rf extensions/dip
          mkdir -p extensions
          cp -R ../deploy/openclaw-extensions/dip extensions/dip

      - name: Prepare Image Metadata
        if: github.event_name != 'pull_request'
        id: prepare
        env:
          RELEASE_TAG: ${{ needs.release-version.outputs.release_tag }}
          RELEASE_TAG_NO_SHA: ${{ needs.release-version.outputs.release_tag_no_sha }}
          PUSH_LATEST: ${{ needs.release-version.outputs.push_latest }}
        run: |
          IMAGE_NAME="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_REPOSITORY}"
          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_tag_no_sha=${RELEASE_TAG_NO_SHA}" >> "${GITHUB_OUTPUT}"
          echo "push_latest=${PUSH_LATEST}" >> "${GITHUB_OUTPUT}"

      - name: Extract Docker Metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.prepare.outputs.release_tag }}
            type=raw,value=${{ steps.prepare.outputs.release_tag_no_sha }}
            type=raw,value=latest,enable=${{ steps.prepare.outputs.push_latest == 'true' }}

      - name: Log In To Huawei SWR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HUAWEI_SWR_USERNAME }}
          password: ${{ secrets.HUAWEI_SWR_PASSWORD }}

      - name: Build And Push Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./studio
          file: ./studio/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
