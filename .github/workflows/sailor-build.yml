name: sailor-build

on:
  push:
    paths:
      - "chat-data/sailor/**"
      - ".github/workflows/sailor-build.yml"
      - ".github/workflows/reusable-build-service.yml"
      - "VERSION"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Whether to also publish the latest tag"
        required: false
        default: "false"

jobs:
  build:
    uses: ./.github/workflows/reusable-build-service.yml
    with:
      service_name: sailor
      image_name: af/sailor
      chart_dir: chat-data/sailor/helm/sailor
      dockerfile: chat-data/sailor/docker/Dockerfile
      build_context: chat-data/sailor
      push_latest: ${{ inputs.push_latest || 'false' }}
    secrets: inherit