    chart: task-center
    version: 0.4.0-main.20260403.1
  dip-hub:
    chart: dip-hub
    version: 0.5.0
  dip-studio:
    chart: dip-studio
    version: 0.7.0-release-0.7.0.6035cad3
    values:
      studio:
        envFileHostPath: /root/.env         # 环境变量配置主机路径，例如：/root/.env。文件不存在时会自动创建。
        OpenClawHostPath: /root/.openclaw   # .openclaw 目录主机路径，例如：/root/.openclaw
        useExternalOpenClaw: false          # 是否使用外置 OpenClaw，默认为 false。当设置为 true 时，studio 将不会启动容器内的 OpenClaw 网关。
