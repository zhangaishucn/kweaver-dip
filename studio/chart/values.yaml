namespace: kweaver

labels:
  deployment:
    name: dip-studio
  pod:
    app: dip-studio
  service:
    app: dip-studio

name: dip-studio-deployment
replicaCount: 1

image:
  registry: swr.cn-east-3.myhuaweicloud.com/kweaver-ai
  repository: dip/dip-studio
  tag: "0.5.0-main"
  pullPolicy: IfNotPresent

service:
  name: dip-studio
  type: ClusterIP
  port: 3000
  targetPort: 3000
  mcpPort: 3001
  mcpTargetPort: 3001

class-443:
  ingressClass: 'class-443'

depServices:
  rds:
    host: mariadb-proton-mariadb.resource.svc.cluster.local
    port: 3306
    database: "kweaver"
    user: "adp"
    password: "3Ci72ILMVn"

ingress:
  enabled: true
  path: /api/dip-studio
  mcpPath: /studio/mcp
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-Openclaw-Session-Key"
    nginx.ingress.kubernetes.io/cors-expose-headers: "Content-Disposition, Content-Type"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-next-upstream: "off"

studio:
  nodeEnv: production
  envFileHostPath: /root/.env
  OpenClawHostPath: /root/.openclaw/
  KWeaverHydraAdminURL: http://hydra-admin:4445
  useExternalOpenClaw: false

# 与 dip-hub-chart depServices.rds 结构一致
depServices:
  rds:
    system_id: ""
    host: mariadb-proton-mariadb.resource.svc.cluster.local
    port: 3306
    database: "kweaver"
    user: "dip"
    password: "3Ci72ILMVn"
    type: "MariaDB"

resources:
  init:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 4
      memory: 4Gi
  studio:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 4
      memory: 4Gi

nodeSelector: {}
affinity: {}
tolerations: []
